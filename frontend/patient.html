<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MediCare — My Health</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fraunces:opsz,wght@9..144,700;9..144,900&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #FDF6EE;
    --white: #FFFFFF;
    --sage: #6B9E8A;
    --sage-d: #4D7A68;
    --sage-l: #E8F4F0;
    --amber: #E9A84C;
    --amber-d: #D4943A;
    --amber-l: #FEF3DC;
    --ink: #2A1F18;
    --ink2: #3D2B1F;
    --muted: #9C8B7E;
    --border: #EDE4D8;
    --border2: #D4C8BC;
    --danger: #B85248;
    --danger-bg: #FDECEA;
    --blue: #3A6EA5;
    --blue-l: #EAF1FA;
    --font: 'Nunito', sans-serif;
    --serif: 'Fraunces', serif;
    --radius: 14px;
    --shadow: 0 2px 12px rgba(61,43,31,.06);
    --shadow-lg: 0 8px 32px rgba(61,43,31,.12);
  }

  body { font-family: var(--font); background: var(--cream); color: var(--ink2); min-height: 100vh; font-size: 14px; }

  /* ── Top Bar ── */
  .topbar {
    background: var(--white);
    border-bottom: 1.5px solid var(--border);
    padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-logo { font-family: var(--serif); font-size: 22px; font-weight: 900; color: var(--ink); display: flex; align-items: center; gap: 10px; }
  .topbar-logo span { font-size: 22px; }
  .topbar-right { display: flex; align-items: center; gap: 14px; }
  .user-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--sage-l);
    border-radius: 30px;
    padding: 6px 14px 6px 8px;
    font-weight: 800; font-size: 13px; color: var(--sage-d);
  }
  .user-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--sage);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 900;
  }
  .btn-logout {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 7px 14px;
    font-family: var(--font);
    font-size: 12px; font-weight: 800;
    color: var(--muted);
    cursor: pointer; transition: all 0.15s;
  }
  .btn-logout:hover { background: var(--danger-bg); color: var(--danger); border-color: var(--danger); }

  /* ── Tab Nav ── */
  .tabnav {
    background: var(--white);
    border-bottom: 1.5px solid var(--border);
    padding: 0 28px;
    display: flex; gap: 4px;
  }
  .tab {
    padding: 13px 18px;
    font-weight: 800; font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2.5px solid transparent;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .tab:hover { color: var(--ink2); }
  .tab.active { color: var(--sage-d); border-bottom-color: var(--sage); }

  /* ── Content ── */
  .content { max-width: 860px; margin: 0 auto; padding: 28px 20px; }

  /* ── Cards ── */
  .card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 18px;
  }
  .card-title {
    font-family: var(--serif);
    font-size: 17px; font-weight: 900;
    color: var(--ink); margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }

  /* ── Profile ── */
  .profile-hero {
    background: linear-gradient(135deg, #7BB8A6 0%, #4D7A68 100%);
    border-radius: var(--radius);
    padding: 28px;
    color: #fff;
    display: flex; align-items: center; gap: 22px;
    margin-bottom: 18px;
    box-shadow: 0 6px 24px rgba(77,122,104,.3);
  }
  .profile-avatar-lg {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    border: 3px solid rgba(255,255,255,0.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 900;
    flex-shrink: 0;
  }
  .profile-hero-name { font-family: var(--serif); font-size: 24px; font-weight: 900; }
  .profile-hero-sub { font-size: 13px; opacity: 0.8; margin-top: 4px; }
  .profile-hero-tags { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .hero-tag {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px; font-weight: 700;
  }

  /* Info grid */
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .info-item label {
    display: block; font-size: 10.5px; font-weight: 800;
    letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 3px;
  }
  .info-item span { font-size: 14px; font-weight: 700; color: var(--ink2); }
  .badge {
    display: inline-block; padding: 3px 10px;
    border-radius: 20px; font-size: 11.5px; font-weight: 800;
  }
  .badge-blood { background: #FDECEA; color: #B85248; }
  .badge-scheduled { background: var(--blue-l); color: var(--blue); }
  .badge-completed { background: var(--sage-l); color: var(--sage-d); }
  .badge-cancelled { background: #F3EDE7; color: var(--muted); }

  .history-box {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13.5px;
    line-height: 1.7;
    color: var(--ink2);
  }

  /* Allergy warning */
  .allergy-box {
    background: #FFF8E7;
    border: 1.5px solid #F5D88A;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px; font-weight: 700;
    color: #7A5C0A;
    display: flex; align-items: center; gap: 8px;
  }

  /* ── Appointments ── */
  .appt-list { display: flex; flex-direction: column; gap: 12px; }
  .appt-card {
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex; align-items: center; gap: 16px;
    background: var(--cream);
    transition: box-shadow 0.15s;
  }
  .appt-card:hover { box-shadow: var(--shadow-lg); }
  .appt-date-block {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    text-align: center;
    min-width: 62px;
    flex-shrink: 0;
  }
  .appt-day { font-size: 22px; font-weight: 900; color: var(--ink); line-height: 1; }
  .appt-mon { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; }
  .appt-info { flex: 1; }
  .appt-type { font-weight: 800; font-size: 14px; color: var(--ink); }
  .appt-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .appt-time { font-size: 13px; font-weight: 700; color: var(--sage-d); margin-top: 4px; }
  .empty-msg { text-align: center; padding: 36px; color: var(--muted); font-size: 13px; }

  /* ── Book Form ── */
  .book-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label {
    font-size: 11px; font-weight: 800;
    letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted);
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    padding: 10px 13px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--cream);
    font-family: var(--font);
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border 0.15s, box-shadow 0.15s;
    width: 100%;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--amber);
    box-shadow: 0 0 0 3px rgba(233,168,76,.15);
  }
  .form-group textarea { resize: vertical; min-height: 80px; }

  .btn-book {
    background: var(--amber);
    color: #fff;
    border: none;
    border-radius: 11px;
    padding: 13px 28px;
    font-family: var(--font);
    font-size: 14px; font-weight: 800;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; gap: 8px;
    margin-top: 8px;
  }
  .btn-book:hover { background: var(--amber-d); transform: translateY(-1px); box-shadow: 0 5px 18px rgba(233,168,76,.35); }
  .btn-book:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 13px; font-weight: 700;
    box-shadow: var(--shadow-lg);
    opacity: 0; transform: translateY(8px);
    transition: all 0.25s; pointer-events: none; z-index: 999;
  }
  #toast.show { opacity: 1; transform: none; }
  #toast.success { background: var(--sage-d); color: #fff; }
  #toast.error { background: var(--danger); color: #fff; }

  /* Loading */
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .info-grid, .book-grid { grid-template-columns: 1fr; }
    .profile-hero { flex-direction: column; text-align: center; }
    .tabnav { overflow-x: auto; }
  }

  /* ── Queue Status ── */
  .queue-hero {
    border-radius: var(--radius);
    padding: 28px;
    text-align: center;
    margin-bottom: 18px;
    color: #fff;
  }
  .queue-hero.waiting  { background: linear-gradient(135deg, #3A6EA5, #1d4e89); box-shadow: 0 6px 24px rgba(58,110,165,.3); }
  .queue-hero.in_consultation { background: linear-gradient(135deg, #6B9E8A, #4D7A68); box-shadow: 0 6px 24px rgba(77,122,104,.3); }
  .queue-hero.done     { background: linear-gradient(135deg, #7AB878, #4a8048); box-shadow: 0 6px 24px rgba(74,128,72,.25); }
  .queue-hero.not_checked_in { background: linear-gradient(135deg, #E9A84C, #D4943A); box-shadow: 0 6px 24px rgba(233,168,76,.3); }
  .queue-number-big { font-family: var(--serif); font-size: 72px; font-weight: 900; line-height: 1; }
  .queue-pos-label { font-size: 12px; letter-spacing: .1em; text-transform: uppercase; opacity: .8; margin-bottom: 6px; }
  .queue-status-msg { font-size: 18px; font-weight: 800; margin-top: 8px; }
  .queue-sub { font-size: 13px; opacity: .75; margin-top: 5px; }
  .eta-box { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,.2); border-radius: 20px; padding: 8px 18px; margin-top: 14px; font-size: 14px; font-weight: 800; }
  .progress-track { background: rgba(255,255,255,.2); border-radius: 10px; height: 8px; margin: 16px 24px 0; overflow: hidden; }
  .progress-fill  { height: 100%; border-radius: 10px; background: rgba(255,255,255,.8); transition: width .5s; }
  .queue-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  .queue-checkin-btn {
    width: 100%; padding: 14px; border: none; border-radius: 12px;
    background: var(--blue); color: #fff; font-family: var(--font);
    font-size: 15px; font-weight: 800; cursor: pointer; transition: all .15s;
    display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 4px;
  }
  .queue-checkin-btn:hover { background: #2a5a8a; transform: translateY(-1px); box-shadow: 0 5px 16px rgba(58,110,165,.35); }
  .queue-checkin-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }
  .live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse 1.4s ease infinite; margin-right: 4px; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(1.3);} }
  .refresh-note { text-align: center; font-size: 11px; color: var(--muted); margin-top: 10px; }

</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-logo"><span>🏥</span> MediCare</div>
  <div class="topbar-right">
    <div class="user-pill">
      <div class="user-avatar" id="avatarInitials">—</div>
      <span id="patientNameHeader">Patient</span>
    </div>
    <button class="btn-logout" onclick="logout()">⬅ Logout</button>
  </div>
</div>

<!-- Tab Nav -->
<div class="tabnav">
  <div class="tab active" id="tab-overview" onclick="switchTab('overview')">📋 Overview</div>
  <div class="tab" id="tab-appointments" onclick="switchTab('appointments')">📅 My Appointments</div>
  <div class="tab" id="tab-book" onclick="switchTab('book')">➕ Book Appointment</div>
  <div class="tab" id="tab-queue" onclick="switchTab('queue')">🔢 My Queue Status</div>
</div>

<!-- Content -->
<div class="content">

  <!-- Overview Tab -->
  <div id="pane-overview">
    <div class="profile-hero" id="profileHero">
      <div class="profile-avatar-lg" id="heroAvatar">—</div>
      <div>
        <div class="profile-hero-name" id="heroName">Loading…</div>
        <div class="profile-hero-sub" id="heroSub"></div>
        <div class="profile-hero-tags" id="heroTags"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🧾 Personal Information</div>
      <div class="info-grid" id="infoGrid">—</div>
    </div>

    <div id="allergyWrap"></div>

    <div class="card">
      <div class="card-title">📝 Medical History</div>
      <div class="history-box" id="historyBox">—</div>
    </div>
  </div>

  <!-- Appointments Tab -->
  <div id="pane-appointments" style="display:none">
    <div class="card">
      <div class="card-title">📅 My Appointments</div>
      <div class="appt-list" id="apptList"><div class="empty-msg">Loading…</div></div>
    </div>
  </div>

  <!-- Book Tab -->
  <div id="pane-book" style="display:none">
    <div class="card">
      <div class="card-title">➕ Book a New Appointment</div>
      <div class="book-grid">
        <div class="form-group">
          <label>Service</label>
          <select id="b_service">
            <option>General Checkup</option>
            <option>Follow-up</option>
            <option>Consultation</option>
            <option>Lab Review</option>
            <option>Vaccination</option>
          </select>
        </div>
        <div class="form-group">
          <label>Preferred Doctor</label>
          <select id="b_doctor">
            <option>Dr. Ayesha Khan</option>
            <option>Dr. Rajiv Menon</option>
            <option>Dr. Suresh Iyer</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date</label>
          <input id="b_date" type="date"/>
        </div>
        <div class="form-group">
          <label>Time</label>
          <select id="b_time">
            <option>09:00 AM</option><option>09:30 AM</option><option>10:00 AM</option>
            <option>10:30 AM</option><option>11:00 AM</option><option>11:30 AM</option>
            <option>12:00 PM</option><option>02:00 PM</option><option>02:30 PM</option>
            <option>03:00 PM</option><option>03:30 PM</option><option>04:00 PM</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Notes / Symptoms</label>
          <textarea id="b_notes" placeholder="Describe your symptoms or reason for visit…"></textarea>
        </div>
      </div>
      <button class="btn-book" id="bookBtn" onclick="bookAppointment()">📅 Confirm Appointment</button>
    </div>
  </div>


  <!-- Queue Tab -->
  <div id="pane-queue" style="display:none">
    <div id="queue-status-wrap"></div>
  </div>


  <!-- Queue Tab -->
  <div id="pane-queue" style="display:none">
    <div id="queueContent">
      <div class="card"><div style="text-align:center;padding:32px;color:var(--muted)">Loading queue status…</div></div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script>
  const API = 'http://localhost:8000';

  // ── Auth Guard ──
  const role = sessionStorage.getItem('mc_role');
  const patientRaw = sessionStorage.getItem('mc_patient');
  if (role !== 'patient' || !patientRaw) {
    window.location.href = 'login.html';
  }

  const patient = JSON.parse(patientRaw);

  // ── Helpers ──
  function initials(name) {
    return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  }
  function age(dob) {
    return dob ? Math.floor((new Date() - new Date(dob + ' 00:00:00')) / 31557600000) : null;
  }
  function fmtDate(d) {
    return d ? new Date(d + ' 00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';
  }
  function toast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + type;
    setTimeout(()=> t.className='', 3000);
  }

  // ── Populate header ──
  document.getElementById('avatarInitials').textContent = initials(patient.name);
  document.getElementById('patientNameHeader').textContent = patient.name.split(' ')[0];

  // ── Overview ──
  function renderOverview() {
    document.getElementById('heroAvatar').textContent = initials(patient.name);
    document.getElementById('heroName').textContent = patient.name;
    document.getElementById('heroSub').textContent = patient.email || patient.phone;
    const a = age(patient.dob);
    const tags = [];
    if (a) tags.push(`${a} yrs`);
    if (patient.gender) tags.push(patient.gender);
    if (patient.blood_group) tags.push('🩸 ' + patient.blood_group);
    document.getElementById('heroTags').innerHTML = tags.map(t=>`<span class="hero-tag">${t}</span>`).join('');

    document.getElementById('infoGrid').innerHTML = `
      <div class="info-item"><label>Date of Birth</label><span>${fmtDate(patient.dob)}</span></div>
      <div class="info-item"><label>Gender</label><span>${patient.gender||'—'}</span></div>
      <div class="info-item"><label>Phone</label><span>${patient.phone}</span></div>
      <div class="info-item"><label>Email</label><span>${patient.email||'—'}</span></div>
      <div class="info-item"><label>Blood Group</label><span><span class="badge badge-blood">${patient.blood_group||'—'}</span></span></div>
      <div class="info-item"><label>Condition</label><span>${patient.condition||'—'}</span></div>
      <div class="info-item"><label>Last Visit</label><span>${fmtDate(patient.last_visit)}</span></div>
    `;

    if (patient.allergies && patient.allergies.toLowerCase() !== 'none') {
      document.getElementById('allergyWrap').innerHTML = `
        <div class="allergy-box" style="margin-bottom:18px">
          ⚠️ <strong>Allergy Alert:</strong> ${patient.allergies}
        </div>`;
    }

    document.getElementById('historyBox').textContent = patient.history || 'No medical history recorded.';
  }

  // ── Appointments ──
  async function renderAppointments() {
    const el = document.getElementById('apptList');
    el.innerHTML = '<div class="empty-msg">Loading…</div>';
    try {
      // Use dedicated endpoint — no need to fetch all appointments
      const res = await fetch(API + '/appointments/patient/' + patient.id);
      if (!res.ok) throw new Error('Server error: ' + res.status);
      const mine = await res.json();

      if (!mine.length) {
        el.innerHTML = `<div class="empty-msg">
          🗓 No appointments found.<br>
          <span style="font-size:11px;color:var(--muted)">Patient ID: ${patient.id} · Name: ${patient.name}</span>
        </div>`;
        return;
      }

      // Sort: newest date first, then by time
      mine.sort((a, b) => {
        const da = a.date + a.time;
        const db = b.date + b.time;
        return db.localeCompare(da);
      });

      el.innerHTML = mine.map(a => {
        const dt  = new Date(a.date + 'T00:00:00');
        const day = dt.getDate();
        const mon = dt.toLocaleString('en-IN', {month:'short'});
        const yr  = dt.getFullYear();
        const statusLabel = { scheduled:'Scheduled', completed:'Completed', cancelled:'Cancelled' };
        return `<div class="appt-card">
          <div class="appt-date-block">
            <div class="appt-day">${day}</div>
            <div class="appt-mon">${mon}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:1px">${yr}</div>
          </div>
          <div class="appt-info">
            <div class="appt-type">${a.appt_type}</div>
            <div class="appt-meta">${a.doctor}</div>
            <div class="appt-time">🕐 ${a.time}</div>
            ${a.notes ? `<div style="font-size:12px;color:var(--muted);margin-top:4px">${a.notes}</div>` : ''}
          </div>
          <span class="badge badge-${a.status}">${statusLabel[a.status] || a.status}</span>
        </div>`;
      }).join('');
    } catch(e) {
      console.error('renderAppointments error:', e);
      el.innerHTML = `<div class="empty-msg" style="color:#B85248">
        ⚠️ Could not load appointments.<br>
        <span style="font-size:11px">${e.message}</span><br>
        <button onclick="renderAppointments()" style="margin-top:10px;padding:6px 14px;border-radius:8px;border:none;background:var(--sage);color:#fff;font-weight:700;cursor:pointer">Retry</button>
      </div>`;
    }
  }

  // ── Book Appointment ──
  async function bookAppointment() {
    const btn = document.getElementById('bookBtn');
    const date = document.getElementById('b_date').value;
    const notes = document.getElementById('b_notes').value.trim();
    if (!date) { toast('Please select a date.', 'error'); return; }

    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span> Booking…`;

    const payload = {
      patient_id: patient.id,
      patient_name: patient.name,
      doctor: document.getElementById('b_doctor').value,
      date,
      time: document.getElementById('b_time').value,
      appt_type: document.getElementById('b_service').value,
      status: 'scheduled',
      notes: notes || null,
    };

    try {
      await fetch(API + '/appointments', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(payload)
      });
      toast('Appointment booked successfully! ✓');
      document.getElementById('b_date').value = '';
      document.getElementById('b_notes').value = '';
      switchTab('appointments');
    } catch(e) {
      toast('Could not book appointment. Try again.', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '📅 Confirm Appointment';
    }
  }

  // ── Tabs ──
  function switchTab(tab) {
    ['overview','appointments','book','queue'].forEach(t => {
      document.getElementById('tab-' + t).classList.toggle('active', t === tab);
      document.getElementById('pane-' + t).style.display = t === tab ? '' : 'none';
    });
    if (tab === 'appointments') renderAppointments();
    if (tab === 'queue') startQueueStatus();
  }


  // ── Queue Status ──
  let queueStatusInterval = null;

  function startQueueStatus() {
    stopQueueStatus();
    fetchQueueStatus();
    queueStatusInterval = setInterval(fetchQueueStatus, 5000);
  }
  function stopQueueStatus() {
    if (queueStatusInterval) { clearInterval(queueStatusInterval); queueStatusInterval = null; }
  }

  async function fetchQueueStatus() {
    const wrap = document.getElementById('queue-status-wrap');
    if (!wrap) return;
    try {
      const d = await fetch(API + '/queue/patient/' + patient.id).then(r => r.json());
      renderQueueStatus(d, wrap);
    } catch(e) {
      wrap.innerHTML = '<div class="card"><p style="color:var(--danger);font-weight:700">⚠️ Could not load queue status. Is the server running?</p></div>';
    }
  }

  function fmtDateLong(d) {
    return new Date(d + 'T00:00:00').toLocaleDateString('en-IN', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  }

  function renderQueueStatus(d, wrap) {
    // ── No appointment at all ──
    if (!d.has_appointment) {
      wrap.innerHTML = `
        <div class="card">
          <div class="card-title">🔢 Your Queue Status</div>
          <div style="text-align:center;padding:40px 0">
            <div style="font-size:52px;margin-bottom:14px">🗓</div>
            <div style="font-weight:800;font-size:16px;color:var(--ink);margin-bottom:6px">No upcoming appointments</div>
            <div style="color:var(--muted);font-size:13px;margin-bottom:24px">You have no appointments scheduled.</div>
            <button class="btn-book" style="margin:0 auto" onclick="switchTab('book')">➕ Book an Appointment</button>
          </div>
        </div>`;
      return;
    }

    // ── Upcoming (not today) ──
    if (d.mode === 'upcoming') {
      wrap.innerHTML = `
        <div class="card" style="margin-bottom:16px">
          <div class="card-title">🔢 Your Queue Status</div>
          <div style="display:flex;align-items:center;gap:20px;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:20px">
            <div style="background:var(--sage-l);border-radius:16px;width:72px;height:72px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <span style="font-size:32px">📅</span>
            </div>
            <div>
              <div style="font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin-bottom:4px">Next Appointment</div>
              <div style="font-size:18px;font-weight:900;color:var(--ink)">${d.appt_type}</div>
              <div style="font-size:13px;color:var(--sage-d);font-weight:700;margin-top:3px">${fmtDateLong(d.date)} · ${d.scheduled_time}</div>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
            <div class="detail-item"><label>Doctor</label><span>${d.doctor}</span></div>
            <div class="detail-item"><label>Date</label><span>${d.date}</span></div>
            <div class="detail-item"><label>Time</label><span>${d.scheduled_time}</span></div>
            <div class="detail-item"><label>Queue Token</label><span>${d.queue_token ? '#' + d.queue_token : 'Assigned on the day'}</span></div>
          </div>
          <div style="background:#EAF1FA;border:1px solid #B8D0ED;border-radius:12px;padding:13px 16px;font-size:13px;color:#1d4e89;font-weight:600">
            ℹ️ Your queue token will be activated on <strong>${d.date}</strong>. Come back on appointment day to see your live position.
          </div>
        </div>`;
      return;
    }

    // ── Today ──
    const status = d.queue_status || 'waiting';
    const statusColors = {
      waiting: { bg:'#FEF3DC', color:'#A06A10', label:'Waiting' },
      serving: { bg:'var(--sage-l)', color:'var(--sage-d)', label:'You are being served now!' },
      done:    { bg:'#f3ede7', color:'var(--muted)', label:'Done ✓' },
      skipped: { bg:'#FDECEA', color:'var(--danger)', label:'Skipped — check with reception' },
    };
    const sc = statusColors[status] || statusColors.waiting;
    const progressPct = status === 'done' ? 100
      : status === 'serving' ? 85
      : d.ahead === 0 ? 70
      : Math.max(10, 60 - (d.ahead * 15));

    wrap.innerHTML = `
      <div class="card" style="margin-bottom:16px">
        <div class="card-title">🔢 Your Queue Status — Today
          <span style="font-size:11px;color:var(--muted);font-weight:600;margin-left:auto">🔄 Live · updates every 5s</span>
        </div>
        <div style="display:flex;align-items:center;gap:24px;margin-bottom:20px">
          <div style="background:${sc.bg};border-radius:20px;width:90px;height:90px;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:2px solid ${sc.color}20">
            <span style="font-family:var(--serif);font-size:48px;font-weight:900;color:${sc.color}">${d.queue_token || '?'}</span>
          </div>
          <div>
            <div style="font-size:11px;font-weight:800;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);margin-bottom:4px">Your Token Number</div>
            <div style="font-size:17px;font-weight:800;color:var(--ink);margin-bottom:4px">${sc.label}</div>
            ${status === 'waiting' ? `<div style="font-size:13px;color:var(--muted)">${d.ahead === 0 ? '🎉 You are next!' : d.ahead + ' patient' + (d.ahead > 1 ? 's' : '') + ' ahead of you'}</div>` : ''}
            ${status === 'waiting' && d.est_wait_mins > 0 ? `<div style="font-size:13px;font-weight:700;color:var(--sage-d);margin-top:4px">⏱ ~${d.est_wait_mins} min estimated wait</div>` : ''}
            ${status === 'serving' ? `<div style="font-size:13px;font-weight:700;color:var(--sage-d)">✅ Please proceed to the consultation room</div>` : ''}
          </div>
        </div>
        <div style="margin-bottom:20px">
          <div style="display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px">
            <span>Queue Progress</span><span>${progressPct}%</span>
          </div>
          <div style="background:var(--border);border-radius:8px;height:8px;overflow:hidden">
            <div style="height:100%;width:${progressPct}%;background:var(--sage);border-radius:8px;transition:width 0.6s ease"></div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="detail-item"><label>Scheduled Time</label><span>${d.scheduled_time}</span></div>
          <div class="detail-item"><label>Doctor</label><span>${d.doctor}</span></div>
          <div class="detail-item"><label>Type</label><span>${d.appt_type}</span></div>
          <div class="detail-item"><label>Now Serving</label>
            <span>${d.now_serving_token ? 'Token #' + d.now_serving_token + ' — ' + (d.now_serving_name || '') : 'No one yet'}</span>
          </div>
        </div>
      </div>
      <div style="background:#FEF3DC;border:1px solid #F5D88A;border-radius:12px;padding:13px 16px;font-size:13px;color:#7A5C0A;font-weight:600">
        💡 <strong>Tip:</strong> Estimated wait is based on 15 min per patient. Keep this page open to get live updates.
      </div>`;
  }

  // ── Logout ──
  function logout() {
    sessionStorage.clear();
    window.location.href = 'login.html';
  }

  // ── Init ──
  renderOverview();

  // ── Queue Status ──
  let queuePollTimer = null;
  let myAppointmentId = null;

  function startQueuePolling() {
    stopQueuePolling();
    queuePollTimer = setInterval(loadQueueStatus, 10000);
  }
  function stopQueuePolling() {
    if (queuePollTimer) { clearInterval(queuePollTimer); queuePollTimer = null; }
  }

  async function loadQueueStatus() {
    const el = document.getElementById('queueContent');
    // Find today's appointment for this patient
    try {
      const all = await fetch(API + '/queue/today').then(r => r.json());
      const today = new Date().toISOString().split('T')[0];
      const mine = all.filter(a =>
        a.patient_id === patient.id ||
        a.patient_name.toLowerCase() === patient.name.toLowerCase()
      );

      if (!mine.length) {
        el.innerHTML = renderNoAppointment();
        return;
      }

      // Find most relevant appointment (in_consultation > waiting > not_checked_in)
      const priority = ['in_consultation','waiting','not_checked_in','done'];
      mine.sort((a,b) => priority.indexOf(a.queue_status) - priority.indexOf(b.queue_status));
      const appt = mine[0];
      myAppointmentId = appt.id;

      if (appt.queue_status === 'not_checked_in') {
        el.innerHTML = renderCheckIn(appt);
      } else if (appt.queue_status === 'waiting') {
        el.innerHTML = renderWaiting(appt, all);
      } else if (appt.queue_status === 'in_consultation') {
        el.innerHTML = renderInConsultation(appt);
      } else if (appt.queue_status === 'done') {
        el.innerHTML = renderDone(appt);
      } else {
        el.innerHTML = renderNoAppointment();
      }
    } catch(e) {
      el.innerHTML = '<div class="card"><div style="text-align:center;padding:32px;color:var(--danger)">⚠️ Cannot connect to server.</div></div>';
    }
  }

  function renderCheckIn(appt) {
    return `
      <div class="card">
        <div class="queue-hero not_checked_in">
          <div class="queue-pos-label">📅 Today's Appointment</div>
          <div style="font-size:36px;margin:8px 0">🏥</div>
          <div class="queue-status-msg">You haven't checked in yet</div>
          <div class="queue-sub">Scheduled at ${appt.scheduled_time} with ${appt.doctor}</div>
        </div>
        <div class="queue-info-grid">
          <div class="info-item"><label>Appointment Type</label><span>${appt.appt_type}</span></div>
          <div class="info-item"><label>Scheduled Time</label><span>${appt.scheduled_time}</span></div>
          <div class="info-item"><label>Doctor</label><span>${appt.doctor}</span></div>
          <div class="info-item"><label>Status</label><span>Not checked in</span></div>
        </div>
        <div style="margin-top:16px">
          <button class="queue-checkin-btn" id="checkinBtn" onclick="selfCheckIn(${appt.id})">
            ✅ Check In — I'm Here!
          </button>
          <div class="refresh-note">Check in when you arrive at the clinic</div>
        </div>
      </div>`;
  }

  function renderWaiting(appt, all) {
    const waiting = all.filter(a => a.queue_status === 'waiting');
    const pos = waiting.findIndex(a => a.id === appt.id) + 1;
    const total = waiting.length;
    const eta = appt.eta_mins != null ? appt.eta_mins : (pos - 1) * 10;
    const inConsult = all.find(a => a.queue_status === 'in_consultation');
    const pct = Math.max(10, 100 - (pos / Math.max(total,1) * 80));

    return `
      <div class="card">
        <div class="queue-hero waiting">
          <div class="queue-pos-label"><span class="live-dot"></span> Live Queue Position</div>
          <div class="queue-number-big">${pos}</div>
          <div class="queue-status-msg">${pos === 1 ? "You're next! 🎉" : pos + ' patients ahead of you'}</div>
          <div class="queue-sub">Queue #${appt.queue_number} · ${appt.doctor}</div>
          <div class="eta-box">⏱ Estimated wait: ~${eta} minutes</div>
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="queue-info-grid">
          <div class="info-item"><label>Your Queue Number</label><span style="font-size:20px;font-weight:900">#${appt.queue_number}</span></div>
          <div class="info-item"><label>Position in Line</label><span>${pos} of ${total} waiting</span></div>
          <div class="info-item"><label>Scheduled Time</label><span>${appt.scheduled_time}</span></div>
          <div class="info-item"><label>Estimated Wait</label><span>~${eta} minutes</span></div>
          ${inConsult ? `<div class="info-item" style="grid-column:1/-1"><label>Currently Being Seen</label><span>${inConsult.patient_name}</span></div>` : ''}
        </div>
        <div class="refresh-note"><span class="live-dot"></span> Updates every 10 seconds automatically</div>
      </div>`;
  }

  function renderInConsultation(appt) {
    return `
      <div class="card">
        <div class="queue-hero in_consultation">
          <div class="queue-pos-label">You're being seen now</div>
          <div style="font-size:52px;margin:8px 0">👨‍⚕️</div>
          <div class="queue-status-msg">You're in the consultation room!</div>
          <div class="queue-sub">${appt.doctor}</div>
        </div>
        <div class="queue-info-grid">
          <div class="info-item"><label>Queue Number</label><span>#${appt.queue_number}</span></div>
          <div class="info-item"><label>Doctor</label><span>${appt.doctor}</span></div>
          <div class="info-item"><label>Called At</label><span>${appt.called_at ? appt.called_at.split(' ')[1].slice(0,5) : '—'}</span></div>
          <div class="info-item"><label>Type</label><span>${appt.appt_type}</span></div>
        </div>
      </div>`;
  }

  function renderDone(appt) {
    return `
      <div class="card">
        <div class="queue-hero done">
          <div class="queue-pos-label">Consultation complete</div>
          <div style="font-size:52px;margin:8px 0">✅</div>
          <div class="queue-status-msg">Your appointment is done!</div>
          <div class="queue-sub">Thank you for visiting. Get well soon!</div>
        </div>
      </div>`;
  }

  function renderNoAppointment() {
    return `
      <div class="card">
        <div style="text-align:center;padding:40px">
          <div style="font-size:40px;margin-bottom:12px">📅</div>
          <div style="font-weight:800;font-size:15px;color:var(--ink);margin-bottom:6px">No appointment today</div>
          <div style="color:var(--muted);font-size:13px">Book an appointment to join the queue.</div>
          <button onclick="switchTab('book')" style="margin-top:16px;background:var(--amber);color:#fff;border:none;border-radius:10px;padding:10px 22px;font-family:var(--font);font-size:13px;font-weight:800;cursor:pointer;">Book Appointment</button>
        </div>
      </div>`;
  }

  async function selfCheckIn(apptId) {
    const btn = document.getElementById('checkinBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Checking in…'; }
    try {
      const res = await fetch(API + '/queue/checkin/' + apptId, { method: 'POST' });
      const data = await res.json();
      if (!res.ok) { toast(data.detail || 'Check-in failed', 'error'); return; }
      toast('✅ Checked in! You are Queue #' + data.queue_number);
      loadQueueStatus();
    } catch(e) { toast('Cannot connect to server', 'error'); }
  }

</script>
</body>
</html>
